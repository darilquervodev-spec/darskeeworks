<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DarskeeWorks</title>
  <script>
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    // This script takes the current URL and converts the path and query string
    // into just a query string, and then redirects the browser to the new URL
    // with just the query string and hash fragment. This allows the SPA to route
    // based on the path that was requested.
    
    // Use pathSegmentsToKeep = 1 for GitHub Pages (preserves /darskeeworks/)
    // For custom domain deployment, this would be 0
    var pathSegmentsToKeep = 1;
    
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <!-- GitHub Pages SPA redirect -->
</body>
</html>
